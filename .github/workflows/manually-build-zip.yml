name: Manually Build release zip

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy'
        required: true
        type: string
        default: ''

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build JS/CSS assets
        run: npm ci && npm run build

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Archive Release
        uses: thedoctor0/zip-release@b57d897cb5d60cb78b51a507f63fa184cfe35554 #0.7.6
        with:
          type: 'zip'
          filename: 'wp-loupe-admin.zip'
          exclusions: >-
            *.git* /*.github/* /*.vscode/* /*node_modules/* /*tests/*
            /src/js/* /scripts/*
            composer.json composer.lock package.json package-lock.json
            phpunit.xml phpunit.xml.dist phpcs.xml vitest.config.mjs i18n-map.json
            .editorconfig .eslintignore .phpunit.result.cache .eslintrc.js .gitignore .gitattributes
            *.log CHANGELOG.md README.md plan.md
            !readme.txt !lib/* !languages/* !includes/* !vendor/*

      - name: Verify Archive Contents
        run: |
          echo "Listing wp-loupe-admin.zip entries:"
          unzip -l wp-loupe-admin.zip || { echo "Failed to list zip contents"; exit 1; }
          echo "Total files: $(unzip -l wp-loupe-admin.zip | awk 'END{print $2}')"

          # Verify plugin-update-checker is included (required dependency)
          if unzip -l wp-loupe-admin.zip | grep -q "vendor/yahnis-elsts/plugin-update-checker"; then
            echo "✓ plugin-update-checker is included (vendor/)"
          else
            echo "✗ ERROR: plugin-update-checker is missing from the release!"
            exit 1
          fi

      - name: Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda #v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: wp-loupe-admin.zip
          tag_name: ${{ github.event.inputs.tag }}
